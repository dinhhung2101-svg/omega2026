# Render Blueprint - Deploy backend lên Render (Free tier)
# Cách dùng: render.com → New → Blueprint → Upload file này
# Hoặc kết nối GitHub repo và render.yaml sẽ tự nhận

services:
  - type: web
    name: restaurant-booking-api
    runtime: python
    repo: https://github.com/dinhhung2101-svg/omega2026
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11
