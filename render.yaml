# Render Blueprint - Deploy backend lên Render (Free tier)
services:
  - type: web
    name: restaurant-booking-api
    runtime: python
    repo: https://github.com/dinhhung2101-svg/omega2026
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    autoDeploy: true
    pythonVersion: "3.12"
    envVars:
      - key: SECRET_KEY
        generateValue: true
