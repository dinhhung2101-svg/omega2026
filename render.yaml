# render.yaml — Backend deployment trên Render
# Deploy: tự động mỗi khi push lên main
#
services:
  - type: web
    name: restaurant-booking-api
    runtime: python
    region: singapore
    plan: free

    # Không set rootDir → dùng repo root làm gốc
    # Build: cài dependencies từ backend/requirements.txt
    buildCommand: pip install -r backend/requirements.txt

    # Start: uvicorn chạy từ repo root
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    # Health check
    healthCheckPath: /api/health

    # Auto deploy khi push lên main
    autoDeploy: true

    # Chỉ deploy khi có thay đổi backend thực sự hoặc file gốc
    buildFilter:
      paths:
        - "*.py"
        - routers/**
        - backend/requirements.txt
      ignoredPaths:
        - "**/*.md"
        - "**/*.sh"
        - frontend/**
        - backend/requirements.txt
