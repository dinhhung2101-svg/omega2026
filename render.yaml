# render.yaml — Backend deployment trên Render (DOCKER)
# Deploy: tự động mỗi khi push lên main

services:
  - type: web
    name: restaurant-booking-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore
    plan: free

    # Health check
    healthCheckPath: /api/health

    # Auto deploy khi push lên main
    autoDeploy: true
