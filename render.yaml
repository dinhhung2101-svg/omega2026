# render.yaml — Backend deployment trên Render
# Deploy: tự động mỗi khi push lên main
#
services:
  - type: web
    name: restaurant-booking-api
    runtime: python
    region: singapore
    plan: free

    # Build: cài dependencies từ backend/requirements.txt
    buildCommand: pip install -r backend/requirements.txt

    # Start: uvicorn chạy từ repo root, trỏ trực tiếp vào backend package
    # PYTHONPATH=. đảm bảo Python tìm thấy module backend/ khi import
    startCommand: cd /opt/render/project/src && PYTHONPATH=/opt/render/project/src uvicorn backend.main:app --host 0.0.0.0 --port $PORT

    # Health check
    healthCheckPath: /api/health

    # Auto deploy khi push lên main
    autoDeploy: true
